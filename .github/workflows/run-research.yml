name: Run OpenClaw Research

on:
  # Manual trigger - run once when you need it
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scrape and analyze'
        required: true
        default: 'https://www.example.com'
      max_sources:
        description: 'Maximum number of pages to scrape'
        required: false
        default: '10'
      depth:
        description: 'Crawl depth level'
        required: false
        default: '2'
      enable_ai:
        description: 'Enable AI summarization'
        required: false
        type: boolean
        default: true
      enable_javascript:
        description: 'Enable JavaScript rendering (slower)'
        required: false
        type: boolean
        default: false
  
  # Uncomment below to run on a schedule (e.g., daily at 2 AM UTC)
  # schedule:
  #   - cron: '0 2 * * *'  # Daily at 2:00 AM UTC
  
  # Uncomment to run on push to main branch
  # push:
  #   branches:
  #     - main

jobs:
  run-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          chromium-browser \
          chromium-chromedriver \
          wget \
          unzip
    
    - name: Install Python dependencies
      working-directory: ./agentic_rnd_tool
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run OpenClaw Research Tool
      working-directory: ./agentic_rnd_tool
      env:
        # Set display for headless browser
        DISPLAY: ':99'
      run: |
        # Start virtual display for Selenium
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 3
        
        # Build command based on inputs
        CMD="python orchestrator.py \"${{ github.event.inputs.target_url || 'https://www.example.com' }}\""
        CMD="$CMD --max-sources ${{ github.event.inputs.max_sources || '10' }}"
        CMD="$CMD --depth ${{ github.event.inputs.depth || '2' }}"
        
        # Add AI summarization if enabled
        if [ "${{ github.event.inputs.enable_ai }}" = "true" ]; then
          CMD="$CMD --summarize --summary-length 150"
        fi
        
        # Add JavaScript rendering if enabled
        if [ "${{ github.event.inputs.enable_javascript }}" = "true" ]; then
          CMD="$CMD --javascript"
        fi
        
        echo "Running: $CMD"
        eval $CMD
    
    - name: Upload research reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: research-reports-${{ github.run_number }}
        path: |
          agentic_rnd_tool/reports/*.html
          agentic_rnd_tool/reports/*.json
          agentic_rnd_tool/reports/*.md
        retention-days: 30
    
    - name: Upload orchestrator results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: orchestrator-results-${{ github.run_number }}
        path: |
          agentic_rnd_tool/orchestrator_results_*.json
        retention-days: 30
    
    - name: Generate summary
      if: always()
      run: |
        echo "## 🔬 OpenClaw Research Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Target URL:** ${{ github.event.inputs.target_url || 'https://www.example.com' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Max Sources:** ${{ github.event.inputs.max_sources || '10' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Depth:** ${{ github.event.inputs.depth || '2' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **AI Enabled:** ${{ github.event.inputs.enable_ai || 'true' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **JavaScript:** ${{ github.event.inputs.enable_javascript || 'false' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📊 Reports have been uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
